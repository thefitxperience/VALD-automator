services:
  - type: web
    name: vald-automator
    runtime: python
    region: oregon
    buildCommand: "pip install -r web/backend/requirements.txt"
    startCommand: "cd web/backend && uvicorn main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
